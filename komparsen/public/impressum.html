<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Impressum — Kast</title>
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/styles-alt.css">
</head>
<body>
  <nav class="nav"><div class="nav-inner">
    <a class="brand" href="/" aria-label="Kast — Startseite">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32"><rect x="1.5" y="1.5" width="29" height="29" rx="8"/><path d="M11 8v16M11 16l8-8M12.8 16l8.2 8" fill="none" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="brand-word">Kast</span>
    </a><span class="spacer"></span>
    <span id="navAuth"></span>
  </div></nav>
  <script src="/app.js"></script>
  <script src="/nav.js"></script>
  <div class="container narrow">
    <h1>Impressum</h1>
    <div id="body" class="card" style="box-shadow:none"></div>
    <p class="muted">Alle Angaben werden im Admin-Panel verwaltet.</p>
  </div>
  <script src="/app.js"></script>
  <script>
    api('/api/impressum').then(r => r.ok ? r.json() : null).then(s => {
      const md = (s && s.impressum) || 'Impressum folgt in Kürze.';
      const html = md
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/^## (.+)$/gm, '<h3>$1</h3>')
        .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
        .replace(/\n/g, '<br>');
      document.getElementById('body').innerHTML = html;
    });
  </script>
<script src="/theme.js"></script>
<script src="/consent.js"></script>
</body>
</html>
