<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anmelden — Kast</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav class="nav"><div class="nav-inner">
    <a class="brand" href="/">Kast</a><span class="spacer"></span>
    <a href="/onboarding.html">Komparse werden</a>
  </div></nav>

  <div class="container narrow">
    <h1>Anmelden</h1>
    <p class="lead">Willkommen zurück. Bitte melden Sie sich mit Ihren Zugangsdaten an.</p>
    <div id="msg"></div>
    <form id="form">
      <label for="email">E-Mail</label>
      <input id="email" type="email" autocomplete="username" required>
      <label for="pw">Passwort</label>
      <input id="pw" type="password" autocomplete="current-password" required>
      <label class="check"><input type="checkbox" id="remember" checked>
        <span>Angemeldet bleiben</span></label>
      <button class="btn block" type="submit" style="margin-top:18px">Anmelden</button>
    </form>
    <p class="muted" style="margin-top:18px">
      Noch kein Konto?
      <a href="/onboarding.html">Registrieren</a>
    </p>
  </div>

  <script src="/app.js"></script>
  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg'); msg.innerHTML = '';
      try {
        const r = await api('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: email.value, password: pw.value, remember: remember.checked
          })
        });
        if (!r.ok) throw new Error((await r.json()).error || 'Anmeldung fehlgeschlagen');
        // Rolle automatisch ermitteln (keine Rollen-Abfrage nötig)
        const me = await (await api('/api/auth/me')).json();
        let next = new URLSearchParams(location.search).get('next');
        if (!next) {
          next = me && me.role === 'admin' ? '/dashboard.html' : '/search.html';
        }
        location.href = next;
      } catch (err) {
        msg.innerHTML = '<div class="notice err">' + esc(err.message) + '</div>';
      }
    });
  </script>
</body>
</html>
