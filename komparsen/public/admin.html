<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Einstellungen — Kast</title>
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/styles-alt.css">
</head>
<body class="guard">
  <nav class="nav"><div class="nav-inner">
    <a class="brand" href="/" aria-label="Kast — Startseite">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32"><rect x="1.5" y="1.5" width="29" height="29" rx="8"/><path d="M11 8v16M11 16l8-8M12.8 16l8.2 8" fill="none" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="brand-word">Kast</span>
    </a>
    <a href="/dashboard.html">Dashboard</a>
    <a href="/admin.html">Einstellungen</a>
    <span class="spacer"></span>
    <span id="navAuth"></span>
  </div></nav>

  <div class="container">
    <h1>Website-Einstellungen</h1>
    <p class="lead">Rechtstexte &amp; Impressum direkt hier ändern — ohne HTML anzufassen.</p>

    <div class="card">
      <label for="company_name">Firmenname</label>
      <input id="company_name">
      <label for="impressum">Impressum (Markdown)</label>
      <textarea id="impressum" style="min-height:160px"></textarea>
      <label class="check"><input type="checkbox" id="useSeparate">
        <span>Abweichende Adresse nur fürs Impressum verwenden</span></label>
      <div id="sepBox" class="hidden">
        <label for="separate_imprint_address">Impressum-Adresse (eigene Zeile)</label>
        <input id="separate_imprint_address">
      </div>
      <label for="agb">AGB (Markdown)</label>
      <textarea id="agb" style="min-height:140px"></textarea>
      <label for="privacy">Datenschutz (Markdown)</label>
      <textarea id="privacy" style="min-height:140px"></textarea>
      <button class="btn" id="save" style="margin-top:16px">Speichern</button>
    </div>

    <div class="card">
      <h3>ADAG-Abrechnungs-Export</h3>
      <p class="muted">Erzeugt eine CSV für die Abrechnung über ADAG (Zeitarbeit).</p>
      <button class="btn secondary" id="exportAdag">CSV exportieren</button>
    </div>
  </div>

  <script src="/app.js"></script>
  <script src="/nav.js"></script>
  <script src="/admin.js"></script>
<script src="/theme.js"></script>
</body>
</html>
